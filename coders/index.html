<script type="text/javascript">
function updateCoderReadme() {
    const readmeDiv = document.getElementById('readmeDiv');
    const hostname = window.location.hostname.toLowerCase();
    const isAllowedDomain = ['localhost', 'model.earth', 'neighborhood', 'dreamstudio']
        .some(domainPart => hostname.includes(domainPart));

    if (!readmeDiv || isAllowedDomain) {
        return;
    }

    const needsModelEarthPrefix = (href) => {
        if (!href) {
            return false;
        }
        const normalizedHref = href.trim().toLowerCase();
        return normalizedHref &&
            !normalizedHref.startsWith('http://') &&
            !normalizedHref.startsWith('https://') &&
            !normalizedHref.startsWith('//') &&
            !normalizedHref.startsWith('mailto:') &&
            !normalizedHref.startsWith('tel:') &&
            !normalizedHref.startsWith('javascript:') &&
            !normalizedHref.startsWith('#');
    };

    const getTopLevelFolder = (href) => {
        try {
            const pathname = new URL(href, 'https://model.earth/').pathname;
            return pathname.replace(/^\/+/, '').split('/')[0].toLowerCase();
        } catch (error) {
            return '';
        }
    };

    const prependModelEarth = (link) => {
        const href = link.getAttribute('href');
        if (!needsModelEarthPrefix(href)) {
            return;
        }
        if (['team', 'io', 'localsite'].includes(getTopLevelFolder(href))) {
            return;
        }
        link.setAttribute('href', new URL(href, 'https://model.earth/').href);
    };

    readmeDiv.querySelectorAll('a[href]').forEach(prependModelEarth);
}

// Load markdown and execute callback when complete
loadMarkdown("README.md", "readmeDiv", "_parent", undefined, updateCoderReadme);
</script>
